spring.application.name=temenos-internship

# PostgreSQL
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.r2dbc.url=r2dbc:postgresql://postgres:5432/temenos_db
spring.r2dbc.username=${DB_USERNAME}
spring.r2dbc.password=${DB_PASSWORD}

# Redis
spring.data.redis.host=${REDIS_HOST:redis}
spring.data.redis.port=${REDIS_PORT:6379}

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Timer scheduling
timer.long-threshold-seconds=${TIMER_LONG_THRESHOLD_SECONDS:300}
timer.max-attempts=${TIMER_MAX_ATTEMPTS:3}
timer.retry-base-delay-seconds=${TIMER_RETRY_BASE_DELAY_SECONDS:30}
timer.loader-batch-size=${TIMER_LOADER_BATCH_SIZE:100}
timer.loader-claim-timeout-ms=${TIMER_LOADER_CLAIM_TIMEOUT_MS:30000}

logging.level.org.flywaydb=DEBUG
logging.level.org.springframework.boot.autoconfigure.flyway=DEBUG
